image_root: './dataset/flickr30k/images/'
disturbance_image_root: './dataset/flickr30k/disturbance_images/'
ann_root: './dataset/flickr30k/'

remain: 'remain_data_match.json'

sensitive_train: 'dbi.json'

sensitive_val: 'dbi_val.json'

sensitive_val_gt: 'dbi_val_gt.json'


remain_val: 'flickr30k_remain_val.json'
remain_val_gt: 'flickr30k_remain_val_gt.json'

pretrained: './output/Caption_flickr_sensitive_dbi/checkpoint_best.pth'

param_indices: './compute_params/dbi/parameter_indices_only_input.json'

#target_layers: 'None'
target_layers: '9,10,11'

gamma1: 0.1
#gamma2: 10.0
gamma2: 10.0
gamma3: 0.2

# size of vit model; base or large
vit: 'base'
vit_grad_ckpt: False
vit_ckpt_layer: 0
# batch_size: 16
batch_size: 16
init_lr: 1e-5


image_size: 384

# generation configs
max_length: 35
min_length: 5
num_beams: 3
prompt: 'a picture of '

# optimizer
weight_decay: 0.05
min_lr: 0
max_epoch: 5

