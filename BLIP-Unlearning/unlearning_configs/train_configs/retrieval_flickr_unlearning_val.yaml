image_root: './dataset/flickr30k/flickr30k-images/'
ann_root: './dataset/flickr30k/mmu/'
dataset: 'flickr_unlearning_val'

unlearning_val_1k: 'unlearning_data_val_1k.json'
unlearning_val_2k: 'unlearning_data_val_2k.json'
unlearning_val_3k: 'unlearning_data_val_3k.json'
unlearning_val_4k: 'unlearning_data_val_4k.json'
unlearning_val_5k: 'unlearning_data_val_5k.json'

# set pretrained as a file path or an url
pretrained: './output/Retrieval_flickr/checkpoint_best.pth'

vit: 'base'
batch_size_train: 16
batch_size_test: 32
vit_grad_ckpt: True
vit_ckpt_layer: 4
init_lr: 1e-5



image_size: 384
queue_size: 57600
alpha: 0.4
k_test: 128
negative_all_rank: False

# optimizer
weight_decay: 0.05
min_lr: 0
max_epoch: 5

