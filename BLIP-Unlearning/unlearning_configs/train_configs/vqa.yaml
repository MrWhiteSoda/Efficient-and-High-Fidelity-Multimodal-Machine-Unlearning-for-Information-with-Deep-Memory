vqa_root: './dataset/coco2014/' #followed by train2014/
vg_root: './dataset/vqa/vg_images/'  #followed by image/
#train_files: ['vqa_train','vqa_val','vg_qa']
train_files: ['vqa_train','vqa_val']
ann_root: './dataset/vqa/'
vqa_train: 'vqa_train.json'
vqa_val: 'vaq_val.json'
vg_qa: 'vg_qa.json'
vqa_test: 'vqa_test.json'
answer_list: 'answer_list.json'

# set pretrained as a file path or an url
pretrained: './checkpoints/model_base_capfilt_large.pth'

# size of vit model; base or large
vit: 'base'
# batch_size_train: 16
batch_size_train: 16
batch_size_test: 32 
vit_grad_ckpt: False
vit_ckpt_layer: 0
init_lr: 2e-5

image_size: 480

k_test: 128
inference: 'generate'

# optimizer
weight_decay: 0.05
min_lr: 0
max_epoch: 10