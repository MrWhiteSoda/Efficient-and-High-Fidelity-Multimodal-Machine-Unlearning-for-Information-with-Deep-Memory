image_root: './dataset/flickr30k/images/'
ann_root: './dataset/flickr30k/'
flickr_gt_root: './dataset/flickr30k/'


sensitive_train: 'flickr30k_resume_train.json'

sensitive_val: 'resume_val.json'

sensitive_val_gt: 'resume_val_gt.json'

remain_val: 'flickr30k_remain_val.json'
remain_val_gt: 'flickr30k_remain_val_gt.json'

# set pretrained as a file path or an url
pretrained: './checkpoints/model_base_capfilt_large.pth'

# size of vit model; base or large
vit: 'base'
vit_grad_ckpt: False
vit_ckpt_layer: 0
batch_size: 16
init_lr: 1e-5


image_size: 384

# generation configs
max_length: 35
min_length: 5
num_beams: 3
prompt: 'a picture of '

# optimizer
weight_decay: 0.05
min_lr: 0
max_epoch: 5

