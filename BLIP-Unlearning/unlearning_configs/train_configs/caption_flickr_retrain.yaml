image_root: './dataset/flickr30k/images/'
ann_root: './dataset/flickr30k/'
flickr_gt_root: './dataset/flickr30k/'

retrain: 'flickr30k_sensitive_retrain.json'

dbi_val: 'dbi_val.json'
edu_val: 'edu_val.json'
fi_val: 'fi_val.json'
idc_val: 'idc_val.json'
mi_val: 'mi_val.json'
resume_val: 'resume_val.json'

dbi_val_gt: 'dbi_val_gt.json'
edu_val_gt: 'edu_val_gt.json'
fi_val_gt: 'fi_val_gt.json'
idc_val_gt: 'idc_val_gt.json'
mi_val_gt: 'mi_val_gt.json'
resume_val_gt: 'resume_val_gt.json'

remain_val: 'flickr30k_remain_val.json'
remain_val_gt: 'flickr30k_remain_val_gt.json'

# set pretrained as a file path or an url
pretrained: './checkpoints/model_base_capfilt_large.pth'

# size of vit model; base or large
vit: 'base'
vit_grad_ckpt: False
vit_ckpt_layer: 0
batch_size: 16
init_lr: 1e-5



image_size: 384

# generation configs
max_length: 35
min_length: 5
num_beams: 3
prompt: 'a picture of '

# optimizer
weight_decay: 0.05
min_lr: 0
max_epoch: 5

